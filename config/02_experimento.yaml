# --- LOAN_STATUS_PREDICTION ---
# config/02_experimento.yaml

# Nombre experimento
experiment_name: 'EXP_02'

# Variable objetivo
target_variable: 'loan_paid_back'

# Semilla
seed: 42

# Validación
data_split:
  test_size: 0.2
  train_set_pre: '01_train.csv'
  test_set_pre: '01_test.csv'

final_train:
  train_set_post: '01_train.csv'

####### FEATURE SELECTION
log_reg:
  solver: 'saga'
  max_iter: 1000
  l1_ratio: 0.5
  penalty: 'l1'
  C: 1.0

random_forest:
  n_estimators: 500
  max_leaf_nodes: 16
  n_jobs: -1

######## TRAIN

# Definición de columnas
columnas:


  num_cols:
    age:
      transform: 'passthrough'        
    annual_income:
      transform: 'log_scale'           
    monthly_income:
      transform: 'log_scale'
    debt_to_income_ratio:
      transform: 'log_scale'
    credit_score:
      transform: 'scale'              
    loan_amount:
      transform: 'scale'
    interest_rate:
      transform: 'scale'
    installment:
      transform: 'scale'
    num_of_open_accounts:
      transform: 'scale'
    total_credit_limit:
      transform: 'log_scale'
    current_balance:
      transform: 'log_scale'
    delinquency_history:
      transform: 'log1p_scale'        
    public_records:
      transform: 'scale'
    num_of_delinquencies:
      transform: 'scale'

  # Variables ordinales 
  cat_ord_cols:
    education_level:
      categories: [ "Bachelor's", "High School", "Master's", "PhD", "Other"]
    grade_subgrade:
      categories: ['A1','A2','A3','A4','A5', 'B1', 'B2','B3','B4','B5', 'C1', 'C2','C3','C4','C5', 'D1', 'D2','D3','D4','D5', 'E1', 'E2','E3','E4','E5', 'F1', 'F2', 'F3','F4','F5']

  # Variables nominales con OneHotEncoder (drop first)
  cat_nom_ohe_drop:
    - gender
    - marital_status
    - employment_status
    - loan_purpose
    - loan_term                 

  # Variables nominales con OneHotEncoder sin drop
  cat_nom_ohe: []

  # Variables nominales con Frequency Encoding
  cat_nom_frec: []                    

# Configuración del preprocesamiento global
preprocessing:
  remainder: 'passthrough'             
  onehot_drop:
    drop: 'first'
    handle_unknown: 'ignore'
  onehot:
    handle_unknown: 'ignore'

######## FEATURE ENGINEERING
feature_engineering:
  create_age_group: True
  age_bins: [20, 29, 35, 40, 50, 75]         
  age_labels: ['joven', 'adulto_joven', 'adulto', 'adulto_mayor', '3_Edad']  

  create_loan_to_income: True

  create_has_delinquency_history: True 

  create_severity_score: True

  create_payment_income: True
  
######## SMOTE
smote:
  sampling_strategy: 'auto'
  k_neighbors: 5
  random_state: 42


######## MODELS
models:
  n_estimators: 500
  max_samples : 0.5
  bootstrap : True
  n_jobs : -1
  base_model_params:
      class: sklearn.ensemble.RandomForestClassifier
      params:
        n_estimators: 30 
        max_leaf_nodes : 20
        random_state : null
        n_jobs : -1

# BÚSQUEDA DE HIPERPARÁMETROS EN EL GRID
random_search:
  tipo: 'RandomizedSearchCV'
  n_iter: 30
  scoring: 'precision' 
  cv_folds: 3                
  n_jobs: -1                    
  verbose: 1                     
  error_score: 'raise'                        
  param_grid:    
    # BAGGING
    'model__n_estimators': [350, 500]
    'model__max_samples' : [0.3, 0.5]
    'model__bootstrap' : [True]
    'model__n_jobs' : [-1]
    # RANDOM FOREST
    'model__estimator__n_estimators': [30, 35]
    'model__estimator__max_leaf_nodes' : [30, 50]
    'model__estimator__min_samples_split': [5, 10]
    'model__estimator__max_features': ['sqrt']
    