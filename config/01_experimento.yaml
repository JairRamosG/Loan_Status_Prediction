# --- LOAN_STATUS_PREDICTION ---
# config/01_experimento.yaml


####### EDA

# Nombre experimento
experiment_name: 'EXP_01'

# Variable objetivo
target_variable: 'loan_paid_back'

# Semilla
seed: 42

# Validación
data_split:
  test_size: 0.2
  train_set_pre: '01_train.csv'
  test_set_pre: '01_test.csv'

final_train:
  train_set_post: '01_train.csv'

####### FEATURE SELECTION
log_reg:
  solver: 'saga'
  max_iter: 1000
  l1_ratio: 0.5
  penalty: 'l1'
  C: 1.0

random_forest:
  n_estimators: 500
  max_leaf_nodes: 16
  n_jobs: -1

######## TRAIN

# logger
log_file : 'EXP_01'

# Definición de columnas
columnas:
  ignorar: []

  num_cols:
    age:
      transform: 'passthrough'         
    annual_income:
      transform: 'log_scale'             
    monthly_income:
      transform: 'log_scale'
    debt_to_income_ratio:
      transform: 'log_scale'
    credit_score:
      transform: 'scale'                 
    loan_amount:
      transform: 'scale'
    interest_rate:
      transform: 'scale'
    installment:
      transform: 'scale'
    num_of_open_accounts:
      transform: 'scale'
    total_credit_limit:
      transform: 'log_scale'
    current_balance:
      transform: 'log_scale'
    delinquency_history:
      transform: 'log1p_scale'          
    public_records:
      transform: 'scale'
    num_of_delinquencies:
      transform: 'scale'
    # Nuevas variables (se crearán en feature engineering)
    loan_to_income:
      transform: 'scale'
    severity_score:
      transform: 'scale'
    payment_income:
      transform: 'scale'
    # has_delinquency_history es binaria, se puede dejar fuera o con passthrough

  cat_ord_cols:
    education_level:
      categories: ['High School', 'Associate', 'Bachelor', 'Master', 'Doctorate']
    grade_subgrade:
      categories: ['A1', 'A2', 'B1', 'B2', 'C1', 'C2', 'D1', 'D2', 'E1', 'E2', 'F1', 'F2', 'G1']
    age_group:                              
      categories: ['joven', 'adulto_joven', 'adulto', 'adulto_mayor', '3_Edad']

  cat_nom_ohe_drop:
    - gender
    - marital_status
    - employment_status
    - loan_purpose
    - loan_term                   

  cat_nom_ohe: []                         
  cat_nom_frec: []                       

# Configuración del preprocesamiento global
preprocessing:
  remainder: 'passthrough'
  onehot_drop:
    drop: 'first'
    handle_unknown: 'ignore'
  onehot:
    handle_unknown: 'ignore'  

######## FEATURE ENGINEERING
feature_engineering:
  create_age_group: True
  age_bins: [20, 29, 35, 40, 50, 75]         
  age_labels: ['joven', 'adulto_joven', 'adulto', 'adulto_mayor', '3_Edad']  

  create_loan_to_income: True

  create_has_delinquency_story: True 

  create_severity_score: True

  create_payment_income: True
  
