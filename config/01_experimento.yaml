# --- LOAN_STATUS_PREDICTION ---
# config/01_experimento.yaml


####### EDA

# Nombre experimento
experiment_name: 'EXP_01'

# Variable objetivo
target_variable: 'loan_paid_back'

# Semilla
seed: 42

# Validación
data_split:
  test_size: 0.2
  train_set_pre: '01_train.csv'
  test_set_pre: '01_test.csv'

final_train:
  train_set_post: '01_train.csv'

####### FEATURE SELECTION
log_reg:
  solver: 'saga'
  max_iter: 1000
  l1_ratio: 0.5
  penalty: 'l1'
  C: 1.0

random_forest:
  n_estimators: 500
  max_leaf_nodes: 16
  n_jobs: -1

######## TRAIN

# logger
log_file : 'EXP_01'

# Definición de columnas
columnas:
  ignorar: []

  num:
    - 'credit_score'
    - 'debt_to_income_ratio'
    - 'num_of_delinquencies'
    - 'monthly_income'
    - 'current_balance'
    - 'age'
    - 'annual_income'
    - 'interest_rate'
    - 'loan_amount'
    - 'loan_to_income'
    - 'num_of_open_accounts'
    - 'total_credit_limit'
    - 'installment'         
    - 'sevetity_score'       
    - 'payment_income'

  cat_ord:
    - 'education_level'      
    - 'grade_subgrade'       
    - 'age_group'           

  cat_nom_ohe_drop:
    - 'gender'               
    - 'marital_status'      
    - 'loan_term'            
    - 'employment_status'   

  cat_nom_ohe: []

  cat_nom_frec: []